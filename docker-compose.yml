services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: unicompass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unicompass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unicompass-redis
    ports:
      - "6379:6379"

  rss-bridge:
    image: rssbridge/rss-bridge
    container_name: unicompass-rss-bridge
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
